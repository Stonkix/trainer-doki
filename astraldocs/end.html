<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/png" href="Icon_Astal_Docs_color_v1.png">
    <title>Завершение - Доки</title>
    <style>
      body {
        background-color: #ffffff;
        margin: 0;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        font-family: "Montserrat", sans-serif;
      }
      .container {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .end-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      .mascot {
        width: 200px;
        height: auto;
        margin-bottom: 40px;
      }
      .end-text {
        font-size: 20px;
        line-height: 1.6;
        color: #333;
        margin-bottom: 40px;
      }
      .btn-connect {
        background-color: #6746EB;
        color: white;
        padding: 16px 32px;
        border-radius: 12px;
        text-decoration: none;
        font-weight: 700;
        font-size: 18px;
        transition: background-color 0.3s ease;
        box-shadow: 0 4px 15px rgba(103, 70, 235, 0.3);
      }
      .btn-connect:hover {
        background-color: #5236d1;
      }
      .back-link {
        margin-top: 30px;
        color: #888;
        text-decoration: none;
        font-size: 14px;
      }
      .back-link:hover {
        color: #6746EB;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="logo-and-title">
          <div class="logo">
            <img src="Icon_Astal_Docs_color_v1.png" alt="Логотип Доки">
          </div>
          <div class="header-title">Доки</div>
        </div>
      </header>

      <main class="end-content">
        <img src="assets/icons/mascotHappyRight.svg" alt="Счастливый маскот" class="mascot">
        <div class="end-text">
          Вы протестировали процесс подписания ЭТрН в сервисе Доки. С 1 сентября 2026 года ЭТрН обязательны для всех участников грузоперевозок по 140-ФЗ. Подключите Доки заранее, чтобы не искать сервис в панике в последний момент.
        </div>
        <a href="https://astral.ru/products/doki/epd/" target="_blank" class="btn-connect">Подключиться</a>
        <a href="./epd.html" class="back-link">← Вернуться в меню</a>
      </main>
    </div>
  </body>
</html>
