<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обучение завершено</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f7fa;
            font-family: "Inter", sans-serif;
            text-align: center;
        }
        .end-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .mascot-img {
            width: 200px;
            height: 200px;
        }
        .end-text {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
        }
        .btn-home {
            padding: 12px 24px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .btn-home:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="end-container">
        <img src="assets/icons/mascotHappyRight.svg" alt="Mascot" class="mascot-img">
        <div class="end-text">Вы прошли обучение!</div>
        <a href="epd.html" class="btn-home">Вернуться на главную</a>
    </div>
</body>
</html>
